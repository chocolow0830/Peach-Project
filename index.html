let _cache={};
async function allClients(){
  const parse=qs=>{const a=[];qs.forEach(d=>{if(d.id.indexOf("__")===0)return;const c=d.data();a.push(c);_cache[c.id]=c;});return a;};
  try{
    const qs=await Promise.race([
      db.collection(COL).get(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),4000))
    ]);
    return parse(qs);
  }catch(e){
    try{const qs=await db.collection(COL).get({source:'cache'});return parse(qs);}
    catch(e2){return Object.keys(_cache).map(k=>_cache[k]);}
  }
}
async function getClient(id){if(_cache[id])return _cache[id];try{const s=await db.collection(COL).doc(id).get();if(s.exists){_cache[id]=s.data();return _cache[id];}return null;}catch(e){return null;}}
function scrub(o){if(o===null||o===undefined)return null;if(Array.isArray(o))return o.map(scrub);if(typeof o==="object"){const r={};Object.keys(o).forEach(k=>{const val=o[k];if(val!==undefined)r[k]=scrub(val);});return r;}return o;}
/* IMPORTANT: with offline persistence, set() only resolves on SERVER ack.
   If the network is slow it never resolves -> UI appears to "not save".
   So we write locally and DON'T await the server. Firestore syncs in background. */
async function saveClient(c){
  const clean=scrub(c); _cache[c.id]=clean;
  try{
    db.collection(COL).doc(c.id).set(clean).catch(function(e){
      showErr("写入云端失败 WRITE FAILED: "+((e&&e.code)||"")+" "+((e&&e.message)||e)+" — 多数是 Firestore Rules 挡住，请到 Firebase Console → Firestore → Rules 改成 allow read, write: if true; 再 Publish");
    });
    return true;
  }catch(e){ showErr("Save failed: "+((e&&e.message)||e)); return false; }
}

  if(s.exists){CFG=Object.assign(JSON.parse(JSON.stringify(DEFAULT_CFG)),s.data());if(!CFG.workouts)CFG.workouts=DEFAULT_CFG.workouts;if(!CFG.warmup)CFG.warmup=DEFAULT_CFG.warmup.slice();if(!CFG.reminders)CFG.reminders={coach:"",student:""};if(!CFG.coaches)CFG.coaches=[];}
  else{await db.collection(COL).doc(CFGID).set(DEFAULT_CFG);CFG=JSON.parse(JSON.stringify(DEFAULT_CFG));}}catch(e){}}

  let lastP="";h+=`<div class="section-label">${t('peach12')}</div>`;let openRows="";
  c.weeks.forEach((w,i)=>{const ph=phase(i);
    if(ph.tag!==lastP){if(openRows)h+=`<div class="rowlist">${openRows}</div>`;openRows="";lastP=ph.tag;h+=`<div class="section-label" style="margin-top:16px">${ph.tag}<span class="ph">${esc(phSub(i))}</span></div>`;}
    const both=w.s1.done&&w.s2.done,k=ww(i);const lg=w.check.light?`<span class="light ${w.check.light}"></span>`:'';
    openRows+=`<button class="lrow ${both?'done':''}" onclick="go('${edit?'cweek':'gweek'}',{cid:'${c.id}',wk:${i}})">
      <div class="wnum">${both?'✓':(t('week')==='Week'?'W':'W')+(i+1)}</div><div class="t"><div class="h">${t('week')} ${i+1} ${lg}</div><div class="s">${w.goal?esc(w.goal):WO(k[0]).name+' · '+WO(k[1]).name}</div></div>
      <div class="r"><span class="dot2 ${w.s1.done?'on':''}"></span><span class="dot2 ${w.s2.done?'on':''}"></span></div><span class="chev">›</span></button>`;});
  if(openRows)h+=`<div class="rowlist">${openRows}</div>`;
  h+=gradCard(c,edit);
  if(edit)h+=`<button class="btn ghost" style="margin-top:6px" onclick="delC('${c.id}')">${t('delStudent')}</button>`;
  return h;
}
function next(c){for(let i=0;i<c.starter.length;i++)if(!c.starter[i].done)return "Starter "+(i+1);

    <label class="f"><span class="lab">${t('pw')}</span><input class="inp" id="co_pw" value="${esc(c.password)}"></label>
    <button class="btn" onclick="saveCoach(${i})">${t('save')}</button>
    ${i>=0?`<button class="btn ghost" style="margin-top:10px" onclick="delCoach(${i})">${t('del')}</button>`:''}`);}
async function saveCoach(i){const name=v('co_name'),email=v('co_email').toLowerCase(),pw=v('co_pw');
  if(!name||!email||!pw){toast(t('fillNamePw'));return;}
  if(!CFG.coaches)CFG.coaches=[];const rec={name,email,password:pw};
  if(i>=0)CFG.coaches[i]=rec;else CFG.coaches.push(rec);
  await saveCfg();closeModal();toast(t('saved'));render();}
async function delCoach(i){CFG.coaches.splice(i,1);await saveCfg();closeModal();toast(t('deleted'));render();}
/* workouts */
function adminWOPick(){const keys=["A","B","C","D","E","F"];
  return `<button class="backbtn" onclick="go('admin')">‹ ${t('back')}</button><h1 style="font-size:22px;margin:6px 2px 12px">${t('pickWO')}</h1><div class="rowlist">`+
    keys.map(k=>`<button class="lrow" onclick="adminEditWO('${k}')"><div class="wnum">${k}</div><div class="t"><div class="h">${esc(WO(k).name)}</div><div class="s">${WO(k).ex.length} ${t('exercises')}</div></div><span class="chev">›</span></button>`).join("")+`</div>`;}
function adminEditWO(k){S._woKey=k;S._woName=WO(k).name;S._wo=JSON.parse(JSON.stringify(WO(k).ex));go('admin_wo');}
function adminWOScreen(){
  const rows=S._wo.map((e,i)=>`<button class="exedit" onclick="editExPop(${i})"><div class="info"><div class="en">${esc(e.n)||'—'}</div><div class="em">${exSets(e)}${t('setsWord')} × ${esc(e.reps||'')} · ${e.wt==='per'?t('perHand'):e.wt==='body'?t('wtBody'):t('wtTotal')}</div></div><span class="chev">›</span></button>`).join("");
  return `<button class="backbtn" onclick="go('admin_wopick')">‹ ${t('back')}</button>
    <div style="margin:6px 2px 12px"><div class="eyebrow" style="margin-bottom:4px">${t('editWO')}</div>
    <input class="inp" id="wo_name" value="${esc(S._woName)}" style="font-family:Fraunces;font-size:18px;font-weight:600" onchange="S._woName=this.value"></div>
    ${rows}
    <button class="btn ghost" style="margin:4px 0 10px" onclick="editExPop(-1)">${t('addEx')}</button>
    <button class="btn" onclick="saveWO()">${t('save')}</button>`;}
function editExPop(i){const e=i>=0?S._wo[i]:{n:"",sets:3,reps:"10",wt:"total",note:""};
  showModal(`<h2 style="font-size:20px">${i>=0?t('editWO'):t('addEx').replace('＋ ','')}</h2>
    <label class="f"><span class="lab">${t('exName')}</span><input class="inp" id="ex_n" value="${esc(e.n)}" placeholder="Hip Thrust"></label>
    <div class="r3"><label class="f"><span class="lab">${t('setsWordFull')}</span><input class="inp" id="ex_sets" inputmode="numeric" value="${esc(e.sets||3)}"></label>
      <label class="f"><span class="lab">${t('targetReps')}</span><input class="inp" id="ex_reps" value="${esc(e.reps||'')}" placeholder="8-10"></label></div>
    <label class="f"><span class="lab">${t('wtType')}</span><select class="inp" id="ex_wt">
      <option value="total" ${e.wt==='total'?'selected':''}>${t('wtTotal')}</option>
      <option value="per" ${e.wt==='per'?'selected':''}>${t('wtPer')}</option>
      <option value="body" ${e.wt==='body'?'selected':''}>${t('wtBody')}</option></select></label>
    <label class="f"><span class="lab">💡 ${t('tipWord')}</span><input class="inp" id="ex_note" value="${esc(e.note||'')}" placeholder="空杆→5→7.5kg…"></label>
    <button class="btn" onclick="saveExPop(${i})">${t('save')}</button>
    ${i>=0?`<button class="btn ghost" style="margin-top:10px" onclick="delExPop(${i})">${t('del')}</button>`:''}`);}
function saveExPop(i){const n=v('ex_n');if(!n){toast(t('fillNamePw'));return;}
  const e={n,sets:Math.max(1,parseInt(v('ex_sets'))||3),reps:v('ex_reps')||"10",wt:document.getElementById('ex_wt').value,note:v('ex_note')};
  if(i>=0)S._wo[i]=e;else S._wo.push(e);closeModal();render();}
function delExPop(i){S._wo.splice(i,1);closeModal();render();}
async function saveWO(){S._woName=v('wo_name')||S._woName;CFG.workouts[S._woKey]={name:S._woName||("Glute "+S._woKey),ex:S._wo.filter(e=>e.n)};await saveCfg();toast(t('saved'));go('admin_wopick');}
/* warmup */
function adminWarmScreen(){const rows=(CFG.warmup||[]).map((wm,i)=>`<div class="exedit"><input class="inp" id="wm_${i}" value="${esc(wm)}" style="margin:0"><button class="smalllink" onclick="delWarm(${i})" style="flex:none">${t('del')}</button></div>`).join("");
  return `<button class="backbtn" onclick="go('admin')">‹ ${t('back')}</button><h1 style="font-size:22px;margin:6px 2px 6px">${t('warmTitle')}</h1>
    <p class="muted" style="font-size:12.5px;margin:0 2px 12px">${t('warmHint')}</p>${rows}
    <button class="btn ghost" style="margin:4px 0 10px" onclick="addWarm()">${t('addWarm')}</button><button class="btn" onclick="saveWarm()">${t('save')}</button>`;}
function syncWarm(){CFG.warmup=(CFG.warmup||[]).map((_,i)=>v('wm_'+i));}
function addWarm(){syncWarm();CFG.warmup.push("");render();}
function delWarm(i){syncWarm();CFG.warmup.splice(i,1);render();}
async function saveWarm(){syncWarm();CFG.warmup=CFG.warmup.filter(x=>x);await saveCfg();toast(t('saved'));go('admin');}
/* reminders */
function adminRemScreen(){return `<button class="backbtn" onclick="go('admin')">‹ ${t('back')}</button><h1 style="font-size:22px;margin:6px 2px 12px">${t('remTitle')}</h1>
    <div class="card"><div class="eyebrow">${t('forCoach')}</div><textarea class="inp" id="rem_coach" placeholder="${t('remCoachPh')}">${esc(CFG.reminders.coach||'')}</textarea><p class="muted" style="font-size:11.5px;margin:6px 0 0">${t('forCoachHint')}</p></div>
    <div class="card"><div class="eyebrow">${t('forStudent')}</div><textarea class="inp" id="rem_student" placeholder="${t('remStuPh')}">${esc(CFG.reminders.student||'')}</textarea><p class="muted" style="font-size:11.5px;margin:6px 0 0">${t('forStudentHint')}</p></div>
    <button class="btn" onclick="saveRem()">${t('save')}</button>`;}
async function saveRem(){CFG.reminders={coach:v('rem_coach'),student:v('rem_student')};await saveCfg();toast(t('saved'));go('admin');}

/* ===== modal ===== */
function showModal(h){const d=document.createElement("div");d.id="mroot";d.style.cssText="position:fixed;inset:0;background:rgba(61,43,51,.42);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center";
  d.innerHTML=`<div style="background:var(--blush);width:100%;max-width:480px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;padding:20px 18px 34px">${h}</div>`;
  d.addEventListener("click",e=>{if(e.target.id==="mroot")closeModal();});document.body.appendChild(d);}
function closeModal(){const m=document.getElementById("mroot");if(m)m.remove();}

/* ===== boot ===== */
(async function(){
  if(!FB_OK){render();return;}
  app.innerHTML=navbar()+`<div class="wrap"><div class="hero"><div class="big">🍑</div><h1>Peach Passport</h1><div class="tag">${t('loading')}</div></div></div>`;
  const guard=setTimeout(()=>{app.innerHTML=navbar()+`<div class="wrap"><div class="card"><div class="eyebrow" style="color:var(--bad)">⚠️</div><p style="font-size:13.5px;margin:0">${t('loadErr')}</p></div></div>`;},8000);
  try{await loadCfg();const cs=await allClients();if(!cs.length)await saveClient(demo());clearTimeout(guard);render();}
  catch(e){clearTimeout(guard);app.innerHTML=navbar()+`<div class="wrap"><div class="card"><div class="eyebrow" style="color:var(--bad)">⚠️</div><p style="font-size:13.5px;margin:0">${t('loadErr')}<br><br>${esc((e&&e.message)||e)}</p></div></div>`;}
})();
</script>
</body>
</html>
